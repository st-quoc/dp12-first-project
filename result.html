<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Show Quiz Page</title>
    <link rel="stylesheet" href="css/result.css" />
  </head>

    <main class="container">

        </div>
      </div>
    </main>
