<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Quiz AI Generate with Gemini" />
    <meta name="keywords" content="AI Generate, Free, Quiz," />
    <meta name="author" content="DP12-First-Project" />
    <meta name="robots" content="index, follow" />
    <title>Quiz AI Generate with Gemini</title>

    <link rel="stylesheet" href="../css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- header -->
    <header>
      <!-- Khu vực giới thiệu và nút Generate -->
      <div class="header-top">
        <!-- Logo AI (tạm thời dùng ảnh giả hoặc icon) -->
        <div class="ai-logo">
          <!-- Nếu bạn có file logo thì thay src bằng đường dẫn thật -->
          <img src="image/ai.webp" alt="Ảnh AI" />
        </div>
        <div class="header-content">
          <!-- Tiêu đề giới thiệu -->
          <h1>Generate a quiz from any subject</h1>
          <!-- Nút Generate -->
          <button id="generate-btn">Generate</button>
        </div>
      </div>
    </header>
    <!-- end header -->

    <!--   main   -->
    <main>
      <!-- Khu vực quiz mẫu -->
      <div class="header-bottom">
        <div class="separator">
          <span>Example subject</span>
        </div>
        <div class="sample-quizzes">
          <!-- 3 ô quiz mẫu, tạm để nội dung text -->
          <div class="quiz-box">
            <img src="image/toan.jpeg" alt="Chủ đề toántoán" class="image-effect" />
          </div>
          <div class="quiz-box">
            <img src="image/eng.jpg" alt="Chủ đề tiếng anhanh" class="image-effect" />
          </div>
          <div class="quiz-box">
            <img src="image/html.jpg" alt="Chủ đề HTML" class="image-effect" />
          </div>
        </div>
      </div>
    </main>
    <!--   end main   -->

    <!-- footer -->
    <footer>
      <!-- code here -->
      <p>&copy; 2025 DP12-Team 8. All rights reserved.</p>
    </footer>
    <!-- end footer -->

    <!-- script -->
    <script src="../js/script.js"></script>
    <!-- end script -->
  </body>
</html>
