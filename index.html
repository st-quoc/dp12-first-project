<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Quiz AI Generate with Gemini" />
  <meta name="keywords" content="AI Generate, Free, Quiz," />
  <meta name="author" content="DP12-First-Project" />
  <meta name="robots" content="index, follow" />
  <title>Quiz AI Generate with Gemini</title>
  
  <link rel="stylesheet" href="css/test.css" />
</head>

<body>
  <!-- Header -->
  <header>
    <h1>AI Generate with Gemini</h1>
    <div class="button-group">
      <button onclick="clearStorage()">Xóa lịch sử</button>
      <button onclick="displaySavedQuizzes()">Xem Quiz đã lưu</button>
    </div>
  </header>
  <!-- End Header -->

  <!-- main -->
  <main>
    <button id="show-quiz-form">Generate Quiz by AI</button>
    <div id="quiz-popup" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Generate Quiz</h2>
        <input type="text" id="prompt" placeholder="Quiz Topic" />
        <select aria-label="questions" id="question-count">
          <option value="5">5 questions</option>
          <option value="10">10 questions</option>
          <option value="15">15 questions</option>
          <option value="20">20 questions</option>
        </select>
        <select aria-label="difficulty" id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <select aria-label="language" id="language">
          <option value="english">English</option>
          <option value="vietnamese">Vietnamese</option>
        </select>
        <button onclick="generateQuiz()">Generate Quiz</button>
      </div>
    </div>
    </div>

    <div id="saved-quiz-wrapper">
      <h3 id="saved-quiz-title">Quiz đã lưu</h3>
      <div id="saved-quiz-container"></div>
    </div>

    <div id="quiz-popup-container">
      <button id="quiz-popup-close" onclick="document.getElementById('quiz-popup-container').style.display='none'">
        ✖
      </button>
      <div id="view-quiz-popup">
        <div id="quiz-container"></div>
      </div>
    </div>
  </main>
  <!--   end main   -->

  <!-- footer -->
  <div class="footer-container">
    <p>© 2025 DP12-Team 8. All rights reserved.</p>
  </div>
  <!-- end footer -->

  <!-- script -->
  <script type="module" src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const modal = document.getElementById('quiz-popup')
      const btn = document.getElementById('show-quiz-form')
      const closeBtn = document.querySelector('.close')
      btn.onclick = function () {
        modal.style.display = 'flex'
      }
      closeBtn.onclick = function () {
        modal.style.display = 'none'
      }
    })
  </script>
  <!-- end script -->

</body>
</html>
