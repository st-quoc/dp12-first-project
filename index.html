<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Quiz AI Generate with Gemini" />
    <meta name="keywords" content="AI Generate, Free, Quiz," />
    <meta name="author" content="DP12-First-Project" />
    <meta name="robots" content="index, follow" />
    <title>Quiz AI Generate with Gemini</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <!-- header -->
    <header>
      <div class="header-top">
        <div class="ai-logo">
          <img src="image/ai.webp" onclick="window.location.href='index.html'" alt="Ảnh AI" />
        </div>
        <div class="header-content">
          <h1>Generate a quiz from any subject</h1>
          <button id="generate-btn" onclick="window.location.href='generate.html'">Generate</button>
        </div>
      </div>
      <div class="header-bottom">
        <div class="separator">
          <span>Example subject</span>
        </div>
        <div class="sample-quizzes">
          <div class="quiz-box">
            <img src="image/quiz.webp" alt="Chủ đề mau" onclick="window.location.href='quiz.html'"class="image-effect" />
          </div>
          <div class="quiz-box">
            <img src="image/quiz.webp" alt="Chủ đề mau" onclick="window.location.href='quiz.html'" class="image-effect" />
          </div>
          <div class="quiz-box">
            <img src="image/quiz.webp" alt="Chủ đề mau" onclick="window.location.href='quiz.html'" class="image-effect" />
          </div>
        </div>
      </div>
    </header>

    <footer>
      <p>&copy; 2025 DP12-Team 8. All rights reserved.</p>
    </footer>

    <script type="module" src="../js/app.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const modal = document.getElementById('quiz-popup')
        const btn = document.getElementById('show-quiz-form')
        const closeBtn = document.querySelector('.close')
        btn.onclick = function () {
          modal.style.display = 'flex'
        }
        closeBtn.onclick = function () {
          modal.style.display = 'none'
        }
      })
    </script>
  </body>
</html>
