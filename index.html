<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Quiz AI Generate with Gemini" />
    <meta name="keywords" content="AI Generate, Free, Quiz," />
    <meta name="author" content="DP12-First-Project" />
    <meta name="robots" content="index, follow" />
    <title>Quiz AI Generate with Gemini</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <!-- header -->
    <header>
      <div class="header-top">
        <div class="ai-logo">
          <img src="image/ai.webp" alt="Ảnh AI" />
        </div>
        <div class="header-content">
          <h1>Generate a quiz from any subject</h1>         
          <button id="generate-btn">Generate</button>
        </div>
      </div>
      <div class="header-bottom">
        <div class="separator">
          <span>Example subject</span>
        </div>
        <div class="sample-quizzes">
          <div class="quiz-box">
            <img src="image/toan.jpeg" alt="Chủ đề toántoán" class="image-effect"/>
          </div>
          <div class="quiz-box">
            <img src="image/eng.jpg" alt="Chủ đề tiếng anhanh" class="image-effect"/>
          </div>
          <div class="quiz-box">
            <img src="image/html.jpg" alt="Chủ đề HTML" class="image-effect"/>
          </div>
        </div>
      </div>
    </header>
    <!-- end header -->

    <!-- main -->
    <main>
      <!-- code here -->
      <h1>Quiz Generator</h1>
      <label for="topicInput">Chủ đề:</label>
      <input type="text" id="topicInput" placeholder="Nhập chủ đề..." />

      <label for="questionCountInput">Số lượng câu hỏi:</label>
      <input type="number" id="questionCountInput" placeholder="Nhập số lượng câu hỏi (tối đa 10)" min="1" max="10" />
      <button onclick="generateQuiz()">Tạo đề</button>
      <div id="result"></div>

    </main>
    <!--   end main   -->

    <!-- footer -->
    <footer>
      <!-- code here -->
      <p>&copy; 2025 DP12-Team 8. All rights reserved.</p>
    </footer>
    <!-- end footer -->

    <!-- script -->
    <script src="../js/script.js"></script>
    <script type="module" src="../js/app.js"></script>
    <!-- end script -->
  </body>
</html>
